<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big Dipper Clock</title>

  <!-- KL-UNL shared foundation (copied in unchanged) -->
  <link href="foundation/kl-unl.css" type="text/css" rel="stylesheet" media="all">
  <!-- Sim-specific styles, layered on top of the foundation (never edits it) -->
  <link href="styles/styles.css" type="text/css" rel="stylesheet" media="all">

  <!-- Masthead component: renders the <h1> title plus Reset / Help / About -->
  <script src="foundation/kl-unl-masthead.js" defer></script>
  <!-- Equation helper (no equations in this sim; loaded for foundation parity) -->
  <script src="foundation/kl-unl.js" defer></script>
  <!-- Simulation logic -->
  <script src="simulation.js" type="module"></script>
</head>

<body>
  <div class="app-shell">
    <kl-unl-masthead sim-id="dipperclock" json-url="foundation/contents.json"></kl-unl-masthead>

    <!-- Commit-time status announcements (updated on release/commit, not per tick) -->
    <p id="sim-status" class="sr-only" role="status" aria-live="polite"></p>

    <main class="app-layout" id="app-layout">

      <!-- ============ LEFT: Sky Diagram ============ -->
      <div class="app-layout__left">
        <section class="panel sky-panel" aria-labelledby="sky-heading">
          <h2 id="sky-heading" class="sr-only">Northern Sky Diagram</h2>

          <div class="panel__canvas-wrap sky-stage">
            <canvas id="sky-canvas" width="880" height="790"
                    role="img"
                    aria-label="Northern sky diagram"
                    aria-describedby="sky-desc"></canvas>
            <!-- "N" cardinal label, centered on the green ground (the horizon) -->
            <span class="sky-stage__dir" aria-hidden="true">N</span>
          </div>

          <!-- Spoken description of what the sky currently shows (read on demand;
               live change announcements go through #sim-status instead) -->
          <p id="sky-desc" class="sr-only"></p>

          <div class="sky-controls">
            <span class="control-choice sky-controls__toggle">
              <input type="checkbox" id="show-details" checked>
              <label for="show-details">show details</label>
            </span>
          </div>
        </section>
      </div>

      <!-- ============ RIGHT: Time and Date Controls ============ -->
      <div class="app-layout__right">
        <section class="panel controls-card" aria-labelledby="controls-heading">
          <h2 id="controls-heading" class="panel__heading">Time and Date Controls</h2>

          <div class="controls-card__body">

            <!-- Clock -->
            <div class="clock-block">
              <div class="panel__canvas-wrap clock-stage">
                <canvas id="clock-canvas" width="360" height="360"
                        role="img" aria-label="Time of day clock"
                        aria-describedby="clock-desc"></canvas>
              </div>
              <p id="clock-desc" class="sr-only"></p>
            </div>

            <!-- Numeric / select controls -->
            <div class="settings-block">

              <fieldset class="control-fieldset time-fieldset">
                <legend class="control-fieldset__legend">the time of day:</legend>
                <div class="time-row">
                  <span class="time-input-group">
                    <label class="sr-only" for="hour-input">hour (0 to 23)</label>
                    <input class="control-row__input field--time" id="hour-input"
                           type="text" inputmode="numeric" autocomplete="off"
                           maxlength="2" value="00">
                    <span class="time-colon" aria-hidden="true">:</span>
                    <label class="sr-only" for="minute-input">minute (0 to 59)</label>
                    <input class="control-row__input field--time" id="minute-input"
                           type="text" inputmode="numeric" autocomplete="off"
                           maxlength="2" value="00">
                  </span>
                  <em class="dst-note" id="dst-note" hidden>daylight saving time in effect</em>
                </div>
              </fieldset>

              <div class="button-block">
                <button type="button" class="button" id="system-clock-btn">set to system clock</button>
              </div>

              <fieldset class="control-fieldset date-fieldset">
                <legend class="control-fieldset__legend">the day of year:</legend>
                <div class="date-row">
                  <label class="sr-only" for="day-input">day of month</label>
                  <input class="control-row__input field--day" id="day-input"
                         type="text" inputmode="numeric" autocomplete="off"
                         maxlength="2" value="1">
                  <label class="sr-only" for="month-select">month</label>
                  <select class="field--month" id="month-select"></select>
                </div>
              </fieldset>
            </div>
          </div>

          <!-- Day-of-year strip / month slider -->
          <div class="doy-slider-wrap">
            <div class="doy-slider" id="doy-slider"
                 role="slider"
                 tabindex="0"
                 aria-label="Day of year"
                 aria-valuemin="0" aria-valuemax="364" aria-valuenow="0"
                 aria-valuetext="">
              <div class="doy-slider__months" id="doy-months" aria-hidden="true"></div>
              <div class="doy-slider__cursor" id="doy-cursor" aria-hidden="true"></div>
            </div>
          </div>
        </section>
      </div>

    </main>
  </div>
</body>
</html>
